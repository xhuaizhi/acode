<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .IsEdit}}编辑版本{{else}}新建版本{{end}} - ACode</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a; color: #e2e8f0; min-height: 100vh;
        }
        .navbar {
            background: #1e293b; border-bottom: 1px solid #334155;
            padding: 0 24px; height: 56px; display: flex;
            align-items: center; gap: 16px;
        }
        .navbar a { color: #94a3b8; text-decoration: none; font-size: 13px; }
        .navbar a:hover { color: #f8fafc; }
        .navbar h1 { font-size: 18px; font-weight: 700; color: #f8fafc; }
        .container { max-width: 700px; margin: 0 auto; padding: 24px; }
        .card {
            background: #1e293b; border: 1px solid #334155;
            border-radius: 12px; padding: 32px;
        }
        .card h2 { font-size: 20px; font-weight: 600; margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-size: 13px; color: #94a3b8;
            margin-bottom: 6px; font-weight: 500;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 10px 14px;
            background: #0f172a; border: 1px solid #334155;
            border-radius: 8px; color: #f8fafc; font-size: 14px;
            outline: none; transition: border-color 0.2s;
            font-family: inherit;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: #3b82f6;
        }
        .form-group textarea { min-height: 120px; resize: vertical; }
        .form-row { display: flex; gap: 16px; }
        .form-row .form-group { flex: 1; }
        .checkbox-group {
            display: flex; gap: 24px; margin-bottom: 20px;
        }
        .checkbox-group label {
            display: flex; align-items: center; gap: 8px;
            font-size: 14px; color: #cbd5e1; cursor: pointer;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px; height: 18px; accent-color: #3b82f6;
        }
        .btn-row { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
        .btn {
            padding: 10px 20px; border-radius: 8px; font-size: 14px;
            font-weight: 500; cursor: pointer; border: none;
            text-decoration: none; transition: all 0.2s;
        }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-primary:hover { background: #2563eb; }
        .btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #334155; }
        .btn-ghost:hover { background: #1e293b; color: #f8fafc; }
        .error {
            background: #7f1d1d; border: 1px solid #991b1b;
            color: #fca5a5; padding: 10px 14px; border-radius: 8px;
            font-size: 13px; margin-bottom: 20px;
        }
        .hint { font-size: 12px; color: #64748b; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>ACode</h1>
        <a href="{{.AdminPath}}/">← 返回版本列表</a>
    </div>
    <div class="container">
        <div class="card">
            <h2>{{if .IsEdit}}编辑版本{{else}}新建版本{{end}}</h2>

            {{if .Error}}
            <div class="error">{{.Error}}</div>
            {{end}}

            <form method="POST" action="{{if .IsEdit}}{{.AdminPath}}/versions/update/{{.Version.ID}}{{else}}{{.AdminPath}}/versions/create{{end}}">
                <div class="form-row">
                    <div class="form-group">
                        <label>版本号 *</label>
                        <input type="text" name="version" value="{{.Version.Version}}" required placeholder="1.0.1">
                    </div>
                    <div class="form-group">
                        <label>构建号</label>
                        <input type="text" name="build" value="{{.Version.Build}}" placeholder="2">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>平台</label>
                        <select name="platform">
                            <option value="both" {{if eq .Version.Platform "both"}}selected{{end}}>全平台</option>
                            <option value="windows" {{if eq .Version.Platform "windows"}}selected{{end}}>Windows</option>
                            <option value="mac" {{if eq .Version.Platform "mac"}}selected{{end}}>Mac</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>渠道</label>
                        <select name="channel">
                            <option value="stable" {{if eq .Version.Channel "stable"}}selected{{end}}>稳定版</option>
                            <option value="beta" {{if eq .Version.Channel "beta"}}selected{{end}}>测试版</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>更新标题 *</label>
                    <input type="text" name="title" value="{{.Version.Title}}" required placeholder="新功能 / Bug 修复">
                </div>

                <div class="form-group">
                    <label>更新日志</label>
                    <textarea name="notes" placeholder="支持 Markdown 格式&#10;- 新增 XXX 功能&#10;- 修复 YYY 问题">{{.Version.Notes}}</textarea>
                </div>

                <div class="form-group">
                    <label>下载链接 *</label>
                    <input type="url" name="download_url" value="{{.Version.DownloadURL}}" required
                           placeholder="https://acode.anna.tf/releases/ACode-1.0.1-Setup.exe">
                    <div class="hint">可以是外部链接或本服务器的 /releases/ 路径</div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>文件大小 (bytes)</label>
                        <input type="number" name="file_size" value="{{.Version.FileSize}}" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label>SHA256 校验</label>
                        <input type="text" name="sha256" value="{{.Version.SHA256}}" placeholder="可选">
                    </div>
                </div>

                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" name="is_forced" {{if .Version.IsForced}}checked{{end}}>
                        强制更新
                    </label>
                    <label>
                        <input type="checkbox" name="is_published" {{if .Version.IsPublished}}checked{{end}}>
                        立即发布
                    </label>
                </div>

                <div class="btn-row">
                    <a href="{{.AdminPath}}/" class="btn btn-ghost">取消</a>
                    <button type="submit" class="btn btn-primary">{{if .IsEdit}}保存修改{{else}}创建版本{{end}}</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
