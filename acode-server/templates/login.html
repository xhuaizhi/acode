<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACode 管理登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e2e8f0;
        }
        .login-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo h1 { font-size: 28px; font-weight: 700; color: #f8fafc; }
        .logo p { font-size: 14px; color: #94a3b8; margin-top: 4px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-size: 13px; color: #94a3b8;
            margin-bottom: 6px; font-weight: 500;
        }
        .form-group input {
            width: 100%; padding: 10px 14px;
            background: #0f172a; border: 1px solid #334155;
            border-radius: 8px; color: #f8fafc; font-size: 14px;
            outline: none; transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: #3b82f6; }
        .btn-login {
            width: 100%; padding: 12px;
            background: #3b82f6; color: #fff;
            border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
        }
        .btn-login:hover { background: #2563eb; }
        .error {
            background: #7f1d1d; border: 1px solid #991b1b;
            color: #fca5a5; padding: 10px 14px; border-radius: 8px;
            font-size: 13px; margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <h1>ACode</h1>
            <p>管理后台</p>
        </div>
        {{if .Error}}
        <div class="error">{{.Error}}</div>
        {{end}}
        <form method="POST" action="{{.AdminPath}}/login">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" required autocomplete="username" autofocus>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login">登录</button>
        </form>
    </div>
</body>
</html>
