<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - ACode</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a; color: #e2e8f0; min-height: 100vh;
        }
        .navbar {
            background: #1e293b; border-bottom: 1px solid #334155;
            padding: 0 24px; height: 56px; display: flex;
            align-items: center; gap: 16px;
        }
        .navbar a { color: #94a3b8; text-decoration: none; font-size: 13px; }
        .navbar a:hover { color: #f8fafc; }
        .navbar h1 { font-size: 18px; font-weight: 700; color: #f8fafc; }
        .container { max-width: 500px; margin: 0 auto; padding: 24px; }
        .card {
            background: #1e293b; border: 1px solid #334155;
            border-radius: 12px; padding: 32px;
        }
        .card h2 { font-size: 20px; font-weight: 600; margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-size: 13px; color: #94a3b8;
            margin-bottom: 6px; font-weight: 500;
        }
        .form-group input {
            width: 100%; padding: 10px 14px;
            background: #0f172a; border: 1px solid #334155;
            border-radius: 8px; color: #f8fafc; font-size: 14px;
            outline: none; transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: #3b82f6; }
        .btn-row { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
        .btn {
            padding: 10px 20px; border-radius: 8px; font-size: 14px;
            font-weight: 500; cursor: pointer; border: none;
            text-decoration: none; transition: all 0.2s;
        }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-primary:hover { background: #2563eb; }
        .btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #334155; }
        .btn-ghost:hover { background: #1e293b; color: #f8fafc; }
        .error {
            background: #7f1d1d; border: 1px solid #991b1b;
            color: #fca5a5; padding: 10px 14px; border-radius: 8px;
            font-size: 13px; margin-bottom: 20px;
        }
        .success {
            background: #064e3b; border: 1px solid #059669;
            color: #6ee7b7; padding: 10px 14px; border-radius: 8px;
            font-size: 13px; margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>ACode</h1>
        <a href="{{.AdminPath}}/">← 返回版本列表</a>
    </div>
    <div class="container">
        <div class="card">
            <h2>修改密码</h2>

            {{if .Error}}
            <div class="error">{{.Error}}</div>
            {{end}}
            {{if .Success}}
            <div class="success">{{.Success}}</div>
            {{end}}

            <form method="POST" action="{{.AdminPath}}/password">
                <div class="form-group">
                    <label>原密码</label>
                    <input type="password" name="old_password" required>
                </div>
                <div class="form-group">
                    <label>新密码</label>
                    <input type="password" name="new_password" required minlength="6">
                </div>
                <div class="form-group">
                    <label>确认新密码</label>
                    <input type="password" name="confirm_password" required minlength="6">
                </div>
                <div class="btn-row">
                    <a href="{{.AdminPath}}/" class="btn btn-ghost">取消</a>
                    <button type="submit" class="btn btn-primary">修改密码</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
