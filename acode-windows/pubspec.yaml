name: acode_windows
description: "ACode Windows — AI 编程终端 Flutter 桌面版"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # UI
  fluent_ui: ^4.11.1
  lucide_icons: ^0.257.0
  google_fonts: ^6.2.1

  # 状态管理
  provider: ^6.1.2

  # 数据库
  sqflite_common_ffi: ^2.3.4+4
  path: ^1.9.1
  path_provider: ^2.1.5

  # 终端
  xterm: ^4.0.0
  flutter_pty: ^0.4.2

  # 网络/IO
  http: ^1.3.0
  crypto: ^3.0.6

  # 序列化
  json_annotation: ^4.9.0

  # 工具
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  window_manager: ^0.4.3
  uuid: ^4.5.1
  toml: ^0.16.0
  file_selector_platform_interface: ^2.6.2
  file_selector_windows: ^0.9.3+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.9.4
  build_runner: ^2.4.15

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
